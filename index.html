<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Synapse - Chat with local AI models using Ollama">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self';
                   script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://unpkg.com;
                   style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com;
                   font-src https://fonts.gstatic.com;
                   img-src 'self' data: blob:;
                   connect-src *;">
    <title>Synapse - Local AI Chat</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/themes/modern.css">

    <!-- Apply saved theme before paint to prevent flash -->
    <script>
        try { const t = localStorage.getItem('synapse_theme'); if (t && t !== 'retro') document.documentElement.dataset.theme = t; } catch {}
    </script>

    <!-- KaTeX for LaTeX rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

    <!-- Marked.js for Markdown rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- DOMPurify for HTML sanitization -->
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>

    <!-- PDF.js for client-side PDF text extraction -->
    <script type="module">
        import * as pdfjsLib from 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.9.155/build/pdf.min.mjs';
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.9.155/build/pdf.worker.min.mjs';
        window.pdfjsLib = pdfjsLib;
    </script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Favicon -->
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⟩</text></svg>">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside id="sidebar-container">
            <!-- ChatSidebar component renders here -->
        </aside>
        <div id="sidebar-overlay" class="sidebar-overlay"></div>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="header">
                <button id="hamburger-btn" class="hamburger-btn" title="Open sidebar" aria-label="Open sidebar">
                    <i data-lucide="menu" class="icon"></i>
                </button>
                <div id="model-selector-container">
                    <!-- ModelSelector component renders here -->
                </div>
            </header>

            <!-- Chat View -->
            <section id="chat-view-container">
                <!-- ChatView component renders here -->
            </section>

            <!-- Input Area -->
            <footer id="input-area-container">
                <!-- InputArea component renders here -->
            </footer>

            <!-- Status Bar -->
            <div class="status-bar">
                <div class="status-indicator">
                    <span id="status-dot" class="status-dot"></span>
                    <span id="status-text">Connecting...</span>
                </div>
                <div class="status-info">
                    <span>Synapse v1.0</span>
                </div>
            </div>
        </main>
    </div>

    <!-- Global Utilities (extracted for CSP compliance) -->
    <script src="js/globals.js"></script>

    <!-- App Script -->
    <script type="module" src="js/app.js"></script>
</body>

</html>
